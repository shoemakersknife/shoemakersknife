<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="85%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <style>
    .name {
      font-family: Georgia;
      font-size: 58px;
      font-weight: 500;
      letter-spacing: -0.4px;
      opacity: 0;
      animation: fadeIn 1.3s ease forwards;
    }

    .name-main {
      fill: url(#textGradient);
    }

    .shadow-1 { fill: #8b949e; opacity: 0.25; }
    .shadow-2 { fill: #6e7681; opacity: 0.2; }
    .shadow-3 { fill: #484f58; opacity: 0.15; }
    .shadow-4 { fill: #30363d; opacity: 0.1; }

    .subtitle {
      font-family: Georgia;
      font-size: 22px;
      font-weight: 400;
      fill: #8b949e;
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeIn 1.3s ease forwards;
      animation-delay: 1s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bg {
      fill: #0d1117;
    }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <text x="44" y="104" class="name shadow-4">michael kim</text>
  <text x="43" y="103" class="name shadow-3">michael kim</text>
  <text x="42" y="102" class="name shadow-2">michael kim</text>
  <text x="41" y="101" class="name shadow-1">michael kim</text>

  <text x="40" y="100" class="name name-main">michael kim</text>

  <text x="40" y="140" class="subtitle">
    engineer, developer, and undergrad @ rutgers
  </text>
</svg>
