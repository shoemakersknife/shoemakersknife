<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="85%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c9d1d9"/>
    </linearGradient>
  </defs>

  <style>
    .name {
      font-family: 'STIX Two Text';
      font-size: 58px;
      font-weight: 400;
      fill: url(#textGradient);
      letter-spacing: -0.4px;
      opacity: 0;
      animation: fadeIn 1.3s ease forwards;
    }

    .subtitle {
      font-family: 'STIX Two Text';
      font-size: 22px;
      font-weight: 300;
      fill: #8b949e;
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeIn 1.3s ease forwards;
      animation-delay: 1s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bg {
      fill: #0d1117;
    }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <text x="0" y="100" class="name">michael kim</text>

  <text x="0" y="140" class="subtitle">
    engineer, developer, and undergrad @ rutgers
  </text>
</svg>
